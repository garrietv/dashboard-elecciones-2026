name: ONPE pipeline sync

on:
  push:
    branches: [ main ]
    paths:
      - 'data/tracking.json'
      - 'data/onpe_live.json'
      - 'scripts/*.py'
      - '.github/workflows/onpe-pipeline.yml'
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run full ONPE sync + pipeline
        run: |
          python3 scripts/full_auto_sync.py

      - name: Restore stable ONPE live frontend file
        run: |
          git checkout HEAD -- index.html

      - name: Commit generated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/ scripts/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-sync ONPE snapshots and predictions"
          git push
